<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Giới thiệu MacBook Air M1</title>
  </head>
  <body>
    <!-- SVG: Logo hình vuông màu xám đơn giản (tượng trưng cho Apple) -->
    <svg width="50" height="50">
      <rect x="10" y="10" width="30" height="30" fill="gray" />
    </svg>

    <h1>MacBook Air M1 - Đỉnh Cao Công Nghệ</h1>

    <section>
      <figure>
        <img
          src="https://images.unsplash.com/photo-1611186871348-b1ec696e52c9?auto=format&fit=crop&w=800&q=80"
          alt="MacBook Air M1 màu Silver"
          loading="lazy"
          width="100%"
        />
        <figcaption>
          Hình 1: Thiết kế mỏng nhẹ tinh tế của MacBook Air M1.
        </figcaption>
      </figure>

      <figure>
        <img
          src="https://images.unsplash.com/photo-1517336714460-4c9889a1f2c6?auto=format&fit=crop&w=800&q=80"
          alt="Màn hình Retina trên MacBook"
          loading="lazy"
          width="100%"
        />
        <figcaption>
          Hình 2: Màn hình Retina cho độ hiển thị sắc nét.
        </figcaption>
      </figure>

      <figure>
        <img
          src="https://images.unsplash.com/photo-1614149162883-504ce4d13909?auto=format&fit=crop&w=800&q=80"
          alt="Bàn phím Magic Keyboard"
          loading="lazy"
          width="100%"
        />
        <figcaption>Hình 3: Bàn phím Magic Keyboard gõ cực êm.</figcaption>
      </figure>
    </section>

    <hr />

    <h2>Video giới thiệu chính thức từ Apple</h2>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/jwmS1gc9S5A"
      title="Introduce MacBook Air M1"
      frameborder="0"
      allowfullscreen
    >
    </iframe>

    <hr />

    <h2>Clip trải nghiệm thực tế</h2>
    <video
      controls
      poster="https://images.unsplash.com/photo-1541807084-5c52b6b3adef?w=600"
      width="600"
    >
      <source
        src="https://www.w3schools.com/html/mov_bbb.mp4"
        type="video/mp4"
      />
      <source
        src="https://www.w3schools.com/html/mov_bbb.webm"
        type="video/webm"
      />
    </video>

    <hr />

    <h2>Nghe nhạc nền quảng cáo</h2>
    <audio controls>
      <source
        src="https://www.w3schools.com/html/horse.mp3"
        type="audio/mpeg"
      />
    </audio>

    <hr />
    <p>&copy; Apple - Nội dung về MacBook Air M1</p>
  </body>
</html>
